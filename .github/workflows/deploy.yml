name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-not-real
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      ADMIN_LOG_CHAT_ID: ""
      SENTRY_DSN: ""
      TELEGRAM_BOT_TOKEN: ""
      OPENAI_API_KEY: ""
      GOOGLE_ACCESS_MODE: public_link

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard against tracked secrets and runtime files
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          forbidden_exact = {
              ".env",
              ".env.production",
              "db.sqlite3",
              "local_notes/project_change_journal.md",
          }

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          violations = []
          for path in tracked:
              normalized = path.replace("\\", "/")
              if normalized in forbidden_exact:
                  violations.append(normalized)
              if normalized.startswith("creds/") and normalized.endswith(".json"):
                  violations.append(normalized)

          if violations:
              print("Forbidden secrets/runtime files are tracked:")
              for path in sorted(set(violations)):
                  print(f"- {path}")
              sys.exit(1)

          print("No forbidden secrets/runtime files are tracked.")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r school_journal-main/requirements.txt
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Django tests
        run: python manage.py test journal_links jobs pipeline validation notifications

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
      DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_COMPOSE_FILE DEPLOY_HEALTH_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ -z "${DEPLOY_PORT:-}" ]; then
            echo "DEPLOY_PORT is empty; using SSH port 22"
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_COMPOSE_FILE='$DEPLOY_COMPOSE_FILE' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          docker compose -f "$DEPLOY_COMPOSE_FILE" pull || true
          docker compose -f "$DEPLOY_COMPOSE_FILE" up -d --build
          docker compose -f "$DEPLOY_COMPOSE_FILE" config --services
          docker compose -f "$DEPLOY_COMPOSE_FILE" ps
          docker compose -f "$DEPLOY_COMPOSE_FILE" logs --tail=100 web
          if docker compose -f "$DEPLOY_COMPOSE_FILE" config --services | grep -qx proxy; then
            docker compose -f "$DEPLOY_COMPOSE_FILE" logs --tail=100 proxy
          elif docker compose -f "$DEPLOY_COMPOSE_FILE" config --services | grep -qx caddy; then
            docker compose -f "$DEPLOY_COMPOSE_FILE" logs --tail=100 caddy
          fi
          REMOTE

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          curl --retry 12 --retry-delay 5 --retry-connrefused -fsS "$DEPLOY_HEALTH_URL"
