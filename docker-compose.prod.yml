services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_STATIC_ROOT: /app/staticfiles
      DJANGO_MEDIA_ROOT: /app/media
      APP_LOG_FILE: /app/logs/app.log
      APP_JOB_ERROR_LOG_FILE: /app/logs/jobs_errors.log
      GOOGLE_OAUTH_CLIENT_SECRET_PATH: /app/creds/google/client_secret.json
      GOOGLE_OAUTH_TOKEN_PATH: /app/creds/google/token.json
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /app/creds/service_account.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - logs_data:/app/logs
      - creds_data:/app/creds
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  static_data:
  media_data:
  logs_data:
  creds_data:
  caddy_data:
  caddy_config:
